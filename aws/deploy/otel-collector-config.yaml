apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 30s
        send_batch_size: 1024

    exporters:
      otlphttp/datadog_agent:
        endpoint: "http://datadog.datadog.svc.cluster.local:4318"
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/datadog_agent]

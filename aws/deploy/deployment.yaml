apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: openclaw
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
              cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: IfNotPresent
          command:
            - openclaw
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-token
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-api-key
                  key: ANTHROPIC_API_KEY
            # --- OpenTelemetry (disabled by default) ---
            # To enable metrics export, set OTEL_METRICS_EXPORTER to "otlp"
            # and OTEL_EXPORTER_OTLP_ENDPOINT to any OTLP-compatible receiver
            # (e.g. Datadog agent, Grafana Alloy, standalone OTel Collector).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.openclaw.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "openclaw"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_TRACES_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
          resources:
            requests:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              port: 18789
              path: /healthz
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: auto-approve
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # One-time cleanup: remove nodes disconnected for more than 10 minutes
              echo "Cleaning up stale disconnected nodes..."
              disconnected=$(openclaw nodes status --json 2>/dev/null \
                | node -e "
                  let d='';
                  process.stdin.on('data',c=>d+=c);
                  process.stdin.on('end',()=>{
                    try{
                      const now=Date.now();
                      JSON.parse(d).nodes
                        .filter(n=>!n.connected && n.approvedAtMs && (now-n.approvedAtMs)>600000)
                        .forEach(n=>console.log(n.nodeId));
                    }catch(e){}
                  });
                ")
              for id in $disconnected; do
                echo "Removing stale disconnected node: $id"
                openclaw devices remove "$id" 2>/dev/null || true
              done

              # Ongoing: auto-approve pending pairing requests
              while true; do
                pending=$(openclaw devices list --json 2>/dev/null \
                  | node -e "
                    let d='';
                    process.stdin.on('data',c=>d+=c);
                    process.stdin.on('end',()=>{
                      try{JSON.parse(d).pending.forEach(p=>console.log(p.requestId))}
                      catch(e){}
                    });
                  ")
                for id in $pending; do
                  echo "Auto-approving device: $id"
                  openclaw devices approve "$id" 2>/dev/null || true
                done
                sleep 5
              done
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-token
                  key: OPENCLAW_GATEWAY_TOKEN
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: config
          configMap:
            name: openclaw-config
        - name: tmp-volume
          emptyDir: {}
